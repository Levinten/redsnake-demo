services:
  redsnake-app:
    build: ./app
    container_name: redsnake-${REDSNAKE_ENV}-app
    command: gunicorn main:app -c gunicorn.conf.py
    ports:
      - "8000:8000"
    depends_on:
      redsnake-redis:
        condition: service_healthy
      redsnake-postgres-system:
        condition: service_healthy
      redsnake-postgres-user:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

  redsnake-celery:
    build: ./app
    container_name: redsnake-${REDSNAKE_ENV}-celery
    command: celery -A celery_app worker --loglevel=info
    depends_on:
      redsnake-redis:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

  redsnake-redis:
    image: redis:7-alpine
    container_name: redsnake-${REDSNAKE_ENV}-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redsnake-postgres-system:
    image: postgres:16-alpine
    container_name: redsnake-${REDSNAKE_ENV}-postgres-system
    environment:
      POSTGRES_DB: redsnake_system
      POSTGRES_USER: redsnake
      POSTGRES_PASSWORD: ${POSTGRES_SYSTEM_PASSWORD}
    volumes:
      - postgres_system_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redsnake -d redsnake_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redsnake-postgres-user:
    image: postgres:16-alpine
    container_name: redsnake-${REDSNAKE_ENV}-postgres-user
    environment:
      POSTGRES_DB: redsnake_user
      POSTGRES_USER: redsnake
      POSTGRES_PASSWORD: ${POSTGRES_USER_PASSWORD}
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redsnake -d redsnake_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  postgres_system_data:
  postgres_user_data:
