services:

  # ── Active services ────────────────────────────────────────

  redsnake-postgres-user:
    image: postgres:16-alpine
    container_name: redsnake-dev-postgres-user
    restart: unless-stopped
    env_file:
      - my.env
    environment:
      POSTGRES_DB: redsnake_user
      POSTGRES_USER: redsnake
      POSTGRES_PASSWORD: ${POSTGRES_USER_PASSWORD:-dev_password}
    ports:
      - "${POSTGRES_USER_PORT:-5433}:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redsnake -d redsnake_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redsnake-redis:
    image: redis:7-alpine
    container_name: redsnake-dev-redis
    restart: unless-stopped
    env_file:
      - my.env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

